# CortexBridge — production stack
# Two ingress paths:
#   - Netbird (private): cortex-host.vpn.example via Caddy local CA, for SSH + dev
#   - Cloudflare Tunnel (public): cortex.example.com via CF public cert, for mobile
#     (iOS Web Push requires publicly trusted CA per ADR-012)
# See docs/runbooks/deployment.md for full setup.

name: cortexbridge

services:
  cc-bridge:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: cortexbridge/cc-bridge:latest
    container_name: cc-bridge
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:3000
      - BRIDGE_ADMIN_SECRET=${BRIDGE_ADMIN_SECRET:?required}
      # BRIDGE_HOOK_TOKEN is generated by the bridge process at startup and written to
      # /run/bridge-hook-token (mode 0600). See spec 03 §2.5 + spec 01 §"Container entrypoint".
      # Web Push (VAPID) — PWAs opt in via Settings page; bridge fans out to all subs.
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY:?required}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY:?required}
      - VAPID_SUBJECT=${VAPID_SUBJECT:-mailto:noreply@cortexbridge.local}
      # Public origin the PWA is served from — used by hooks to build click URLs.
      - BRIDGE_PUBLIC_URL=${BRIDGE_PUBLIC_URL:?required}
      # CortexPlexus MCP (ADR-025). Deployment-specific LAN address; empty = cockpit
      # degrades gracefully. Double underscore = .NET config section separator.
      - CortexPlexus__McpUrl=${CORTEXPLEXUS_MCP_URL:-}
    volumes:
      - workspace:/workspace
      - claude-config:/home/cortex/.claude
      # tmux server runs on the VPS host per ADR-013 (claude CLI is on host, not in
      # container). Bind the host's tmux socket so the container's tmux CLIENT can
      # send-keys to the host's session. uid 1000 must match between cortex (container)
      # and youruser (host) for socket access — guaranteed by ADR-006 + ADR-011.
      - /tmp/tmux-1000:/tmp/tmux-1000
      - sqlite-data:/data
      # ccusage runs host-side via systemd-user (Node not in container, per
      # Dockerfile policy). Host samples every ~60s into this dir; bridge reads
      # /var/cortex-bridge/usage.json on each /api/usage request. Read-only.
      - usage-data:/var/cortex-bridge:ro
    networks:
      - cortex
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 30s
    # Loopback-only host binding so CC hooks running on the VPS host
    # (per ADR-013) can POST to /internal/hooks/* without traversing
    # Caddy / CF Tunnel. Caddy + cloudflared still proxy public traffic.
    ports:
      - "127.0.0.1:3000:3000"

  caddy:
    image: caddy:2.8-alpine
    container_name: caddy
    restart: unless-stopped
    # Bind ports only on the Netbird interface IP — Caddy itself stays on the
    # cortex bridge network so service-name DNS (cc-bridge) resolves.
    ports:
      - "${BRIDGE_NETBIRD_IP}:443:443"
      - "${BRIDGE_NETBIRD_IP}:80:80"
    environment:
      - BRIDGE_HOSTNAME=${BRIDGE_HOSTNAME:?required}
      - BRIDGE_NETBIRD_IP=${BRIDGE_NETBIRD_IP:?required}
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
      - caddy-logs:/var/log/caddy
    networks:
      - cortex
    depends_on:
      - cc-bridge

  # Cloudflare Tunnel — public-domain TLS for mobile PWA (iOS Web Push requires
  # publicly trusted CA per ADR-012). Outbound-only; routes Public Hostname
  # configured in CF Zero Trust dashboard → cc-bridge:3000.
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN:?required}
    networks:
      - cortex
    depends_on:
      cc-bridge:
        condition: service_healthy

networks:
  cortex:
    driver: bridge

volumes:
  # ADR-011: workspace + claude-config bind-mount directly from dev user's home on VPS.
  # Single source of truth — VS Code Remote-SSH and the bridge container see the same files.
  # Requires dev user 'youruser' to have uid 1000 to match container's 'cortex' user (ADR-006).
  workspace:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/youruser/workspace
  claude-config:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/youruser/.claude
  sqlite-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/cortex/data/sqlite
  caddy-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/cortex/data/caddy
  caddy-config:
  caddy-logs:
  usage-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/youruser/.local/share/cortex-bridge
